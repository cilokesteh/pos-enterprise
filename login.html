<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#08090a">
<title>Login — POS Enterprise</title>
<script src="config.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="pwa.js"></script>
<style>
  * { font-family: 'Inter', system-ui, sans-serif; }
  body { background: #08090a; color: #f7f8f8; transition: background .2s, color .2s; }
  .card { background: #191a1b; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; transition: background .2s, border-color .2s; }
  .input { background: #0a0b0c; border: 1px solid rgba(255,255,255,0.08); color: #f7f8f8; border-radius: 6px; transition: background .2s, border-color .2s, color .2s; }
  .input:focus { border-color: var(--accent, #7170ff); outline: none; box-shadow: 0 0 0 2px rgba(113,112,255,0.25); }
  .btn { background: var(--accent, #7170ff); color: #fff; border-radius: 6px; font-weight: 500; transition: background .15s; }
  .btn:hover { filter: brightness(1.08); }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
  .btn-ghost { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: #d0d6e0; border-radius: 6px; font-weight: 500; }
  .btn-ghost:hover { background: rgba(255,255,255,0.04); }
  .label { color: #8a8f98; transition: color .2s; }
  .sub { color: #8a8f98; transition: color .2s; }
  .foot { color: #62666d; transition: color .2s; }
  body.light-mode { background: #f3f4f6; color: #111; }
  body.light-mode .card { background: #fff; border-color: rgba(0,0,0,0.12); }
  body.light-mode .input { background: #fff; border-color: rgba(0,0,0,0.12); color: #111; }
  body.light-mode .label { color: #6b7280; }
  body.light-mode .sub { color: #6b7280; }
  body.light-mode .foot { color: #9ca3af; }
  body.light-mode .btn-ghost { border-color: rgba(0,0,0,0.12); color: #374151; }
  #theme-toggle { position: fixed; top: 12px; right: 12px; z-index: 100; cursor: pointer; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; background: rgba(15,16,17,0.9); backdrop-filter: blur(8px); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: #8a8f98; transition: background .2s, color .2s, border-color .2s; }
  #theme-toggle:hover { border-color: rgba(255,255,255,0.25); }
  body.light-mode #theme-toggle { background: rgba(255,255,255,0.9); border-color: rgba(0,0,0,0.12); color: #374151; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <button id="theme-toggle" title="Ganti tema" aria-label="Ganti tema">
    <i id="toggle-icon" class="fa-solid fa-moon"></i>
  </button>
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div id="icon" class="inline-flex items-center justify-center w-14 h-14 rounded-xl mb-4" style="background:var(--accent,#7170ff)">
        <i class="fa-solid fa-building text-white text-2xl"></i>
      </div>
      <h1 id="title" class="text-2xl font-semibold tracking-tight">POS Enterprise</h1>
      <p class="sub text-sm mt-1">Point of Sale · Multi-cabang · Multi-role</p>
    </div>

    <div class="card p-8">
      <h2 class="text-base font-medium mb-5 text-center">Masuk ke akun</h2>
      <form id="login-form" class="space-y-4">
        <div>
          <label class="label text-xs">Email</label>
          <input type="email" id="email" required autocomplete="username" spellcheck="false"
                 class="input w-full px-3 py-3 mt-1 text-sm" placeholder="admin@perusahaan.com">
        </div>
        <div>
          <label class="label text-xs">Password</label>
          <input type="password" id="password" required autocomplete="current-password"
                 class="input w-full px-3 py-3 mt-1 text-sm" placeholder="••••••••">
        </div>
        <button type="submit" id="login-btn" class="btn w-full py-3 text-sm mt-2">
          Login
        </button>
        <button type="button" id="demo-btn" class="btn-ghost w-full py-3 text-sm">
          Masuk Demo (tanpa login)
        </button>
      </form>
      <div id="error" class="hidden mt-4 text-center text-sm" style="color:#f87171"></div>
      <div id="cfg-hint" class="hidden mt-3 text-center text-[11px]" style="color:#8a8f98"></div>
    </div>

    <p class="foot text-center text-[11px] mt-6">
      v1.0 enterprise · Demo: index.html?demo=1
    </p>
  </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    initTheme();
    injectThemeCSS();
    applyThemeToDom();
    const toggle = document.getElementById('theme-toggle');
    if (toggle) {
      toggle.addEventListener('click', (e) => toggleDarkMode(e));
      toggle.setAttribute('data-theme-title', '1');
    }
    const icon = document.getElementById('toggle-icon');
    if (icon) icon.classList.add('theme-toggle-icon');
});
</script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script>
  const t = getTheme();
  document.documentElement.style.setProperty('--accent', t.hex);
  document.getElementById('title').textContent = CONFIG.storeName;
  document.title = 'Login — ' + CONFIG.storeName;

  document.getElementById('demo-btn').addEventListener('click', () => {
    location.href = 'index.html?demo=1';
  });

  function isFirebaseConfigValid(cfg) {
    if (!cfg || !cfg.apiKey) return false;
    const key = String(cfg.apiKey);
    if (!key || key.includes('***') || key.includes('YOUR_') || key.includes('XXXX')) return false;
    if (!String(cfg.messagingSenderId || '').match(/^\d+$/)) return false;
    if (!String(cfg.appId || '').includes(':')) return false;
    return true;
  }

  const errEl = document.getElementById('error');
  const hintEl = document.getElementById('cfg-hint');
  const cfgOk = isFirebaseConfigValid(CONFIG.firebase);
  let auth = null;

  if (!cfgOk) {
    errEl.textContent = 'Firebase API key belum valid. Untuk presentasi, pakai tombol Masuk Demo.';
    errEl.classList.remove('hidden');
    hintEl.textContent = 'Atau buka index.html?demo=1 langsung.';
    hintEl.classList.remove('hidden');
    document.getElementById('login-btn').disabled = true;
  } else {
    try {
      firebase.initializeApp(CONFIG.firebase);
      auth = firebase.auth();
      auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => {});
      auth.onAuthStateChanged(u => {
        if (u) location.href = 'index.html';
      });
    } catch (e) {
      errEl.textContent = 'Gagal init Firebase: ' + (e.message || e);
      errEl.classList.remove('hidden');
      document.getElementById('login-btn').disabled = true;
    }
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('error');
    const btn = document.getElementById('login-btn');
    err.classList.add('hidden');
    if (!auth) {
      err.textContent = 'Firebase belum siap. Pakai Masuk Demo.';
      err.classList.remove('hidden');
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Masuk…';
    try {
      await auth.signInWithEmailAndPassword(
        document.getElementById('email').value.trim(),
        document.getElementById('password').value
      );
      location.href = 'index.html';
    } catch (error) {
      const code = error.code || '';
      if (['auth/wrong-password','auth/user-not-found','auth/invalid-credential','auth/invalid-email'].includes(code)) {
        err.textContent = 'Email atau password salah';
      } else if (code === 'auth/network-request-failed') {
        err.textContent = 'Gagal koneksi. Cek internet.';
      } else if (code === 'auth/too-many-requests') {
        err.textContent = 'Terlalu banyak percobaan. Coba lagi nanti.';
      } else if (code === 'auth/api-key-not-valid' || String(error.message||'').includes('api-key-not-valid')) {
        err.textContent = 'API key Firebase tidak valid. Hard-refresh (Ctrl+Shift+R) atau pakai Masuk Demo.';
      } else {
        err.textContent = 'Error: ' + (code || error.message);
      }
      err.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Login';
    }
  });
</script>
</body>
</html>
