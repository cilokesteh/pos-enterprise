<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#08090a">
<title>Login — POS Enterprise</title>
<script src="config.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="pwa.js"></script>
<style>
  * { font-family: 'Inter', system-ui, sans-serif; }
  body { background: #08090a; color: #f7f8f8; }
  .card { background: #191a1b; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; }
  .input { background: #0a0b0c; border: 1px solid rgba(255,255,255,0.08); color: #f7f8f8; border-radius: 6px; }
  .input:focus { border-color: var(--accent, #7170ff); outline: none; box-shadow: 0 0 0 2px rgba(113,112,255,0.25); }
  .btn { background: var(--accent, #7170ff); color: #fff; border-radius: 6px; font-weight: 500; transition: background .15s; }
  .btn:hover { filter: brightness(1.08); }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div id="icon" class="inline-flex items-center justify-center w-14 h-14 rounded-xl mb-4" style="background:var(--accent,#7170ff)">
        <i class="fa-solid fa-building text-white text-2xl"></i>
      </div>
      <h1 id="title" class="text-2xl font-semibold tracking-tight">POS Enterprise</h1>
      <p class="text-sm mt-1" style="color:#8a8f98">Point of Sale · Multi-cabang · Multi-role</p>
    </div>

    <div class="card p-8">
      <h2 class="text-base font-medium mb-5 text-center">Masuk ke akun</h2>
      <form id="login-form" class="space-y-4">
        <div>
          <label class="text-xs" style="color:#8a8f98">Email</label>
          <input type="email" id="email" required autocomplete="username" spellcheck="false"
                 class="input w-full px-3 py-3 mt-1 text-sm" placeholder="admin@perusahaan.com">
        </div>
        <div>
          <label class="text-xs" style="color:#8a8f98">Password</label>
          <input type="password" id="password" required autocomplete="current-password"
                 class="input w-full px-3 py-3 mt-1 text-sm" placeholder="••••••••">
        </div>
        <button type="submit" id="login-btn" class="btn w-full py-3 text-sm mt-2">
          Login
        </button>
      </form>
      <div id="error" class="hidden mt-4 text-center text-sm" style="color:#f87171"></div>
    </div>

    <p class="text-center text-[11px] mt-6" style="color:#62666d">
      v1.0 enterprise · Buat user di Firebase Authentication
    </p>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script>
  injectThemeCSS();
  const t = getTheme();
  document.documentElement.style.setProperty('--accent', t.hex);
  document.getElementById('title').textContent = CONFIG.storeName;
  document.title = 'Login — ' + CONFIG.storeName;

  firebase.initializeApp(CONFIG.firebase);
  const auth = firebase.auth();
  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => {});

  // Already logged in?
  auth.onAuthStateChanged(u => {
    if (u) location.href = 'index.html';
  });

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('error');
    const btn = document.getElementById('login-btn');
    err.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = 'Masuk…';
    try {
      await auth.signInWithEmailAndPassword(
        document.getElementById('email').value.trim(),
        document.getElementById('password').value
      );
      location.href = 'index.html';
    } catch (error) {
      if (['auth/wrong-password','auth/user-not-found','auth/invalid-credential','auth/invalid-email'].includes(error.code)) {
        err.textContent = 'Email atau password salah';
      } else if (error.code === 'auth/network-request-failed') {
        err.textContent = 'Gagal koneksi. Cek internet.';
      } else if (error.code === 'auth/too-many-requests') {
        err.textContent = 'Terlalu banyak percobaan. Coba lagi nanti.';
      } else {
        err.textContent = 'Error: ' + (error.code || error.message);
      }
      err.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Login';
    }
  });
</script>
</body>
</html>
